findings:
  - id: home-product-owner-alignment
    category: voice
    status: resolved
    reason: The home-page headline narrowed the README's typed-system product category to agents.
    verification:
      - {path: docs/src/index.md, absent: "Reliable agents in Ruby", present: "Program typed LLM systems in Ruby"}
  - id: llms-product-simile
    category: voice
    status: resolved
    reason: The portable software simile hid validation and application-owned runtime boundaries.
    verification:
      - {path: docs/src/llms.txt.erb, absent: "Build LLM apps like you build software", present: "Program typed LLM systems in Ruby"}
      - {path: docs/src/llms-full.txt.erb, absent: "Build LLM apps like you build software", present: "Program typed LLM systems in Ruby"}
  - id: llms-unbounded-optimization
    category: factual
    status: resolved
    reason: Optimization requires an optimizer, examples, a metric, and an execution budget.
    verification:
      - {path: docs/src/llms.txt.erb, absent: "Automatic optimization", present: "Explicit optimization"}
      - {path: docs/src/llms-full.txt.erb, absent: "Automatic optimization", present: "Explicit optimization"}
  - id: llms-production-readiness
    category: factual
    status: resolved
    reason: Available observability, testing, and error APIs do not establish deployment readiness.
    verification:
      - {path: docs/src/llms.txt.erb, absent: "Production-ready", present: "Operational controls"}
      - {path: docs/src/llms-full.txt.erb, absent: "Production-ready", present: "Operational controls"}
  - id: llms-state-observability-boundaries
    category: factual
    status: resolved
    reason: Applications own durable state, and telemetry export requires configured integrations.
    verification:
      - {path: docs/src/llms-full.txt.erb, absent: "Persistent memory for stateful applications", present: "Pass application-owned state"}
      - {path: docs/src/llms-full.txt.erb, absent: "Automatic APM integration", present: "export traces through configured integrations"}
  - id: site-metadata-self-improvement
    category: factual
    status: resolved
    reason: The framework does not autonomously improve every program.
    verification:
      - {path: docs/src/_data/site_metadata.yml, absent: "Self-Improving Language Model Programs", present: "Typed LLM Programs and Agents for Ruby"}
  - id: site-metadata-port-positioning
    category: factual
    status: resolved
    reason: Current positioning is an independent Ruby-native implementation of DSPy's programming model.
    verification:
      - {path: docs/src/_data/site_metadata.yml, absent: "Build self-improving AI systems", present: "Ruby-native implementation of DSPy's programming model"}
  - id: stale-last-modified-metadata
    category: structural
    status: resolved
    reason: Pages changed by the July 2026 editorial work retained 2025 modification dates.
    verification:
      - {path: docs/src/index.md, present: "last_modified_at: 2026-07-15 00:00:00 +0000"}
      - {path: docs/src/core-concepts/predictors.md, present: "last_modified_at: 2026-07-15 00:00:00 +0000"}
      - {path: docs/src/advanced/index.md, present: "last_modified_at: 2026-07-15 00:00:00 +0000"}
      - {path: docs/src/optimization/index.md, present: "last_modified_at: 2026-07-15 00:00:00 +0000"}
      - {path: docs/src/production/index.md, present: "last_modified_at: 2026-07-15 00:00:00 +0000"}
      - {path: docs/src/optimization/benchmarking-raw-prompts.md, present: "last_modified_at: 2026-07-15 00:00:00 +0000"}
  - id: benchmark-event-capture-example
    category: factual
    status: resolved
    reason: The example mixed log hashes and event objects, leaked local scope, and read a cleared event buffer.
    verification:
      - {path: docs/src/optimization/benchmarking-raw-prompts.md, absent: "captured_events", present: "DSPy.events.subscribe(\"lm.tokens\")"}
      - {path: docs/src/optimization/benchmarking-raw-prompts.md, absent: "log_file.truncate", present: "attributes[:total_tokens]"}
      - {path: docs/src/optimization/benchmarking-raw-prompts.md, present: "generator.configure { |config| config.lm = lm }"}
  - id: predictor-observability-boundary
    category: factual
    status: resolved
    reason: Core event subscription is distinct from optional trace export and provider usage availability.
    verification:
      - {path: docs/src/core-concepts/predictors.md, absent: "Observability is automatic", present: "The core event subscription is in-process"}
      - {path: docs/src/core-concepts/predictors.md, absent: "# - dspy.predict", present: "DSPy.events.subscribe(\"lm.tokens\")"}
      - {path: docs/src/core-concepts/predictors.md, absent: "@predictor.call(input)", present: "@predictor.call(**input)"}
      - {path: docs/src/core-concepts/predictors.md, absent: "@primary.call(input)", present: "@primary.call(**input)"}
      - {path: docs/src/core-concepts/predictors.md, absent: "@fallback.call(input)", present: "@fallback.call(**input)"}
  - id: llms-observability-boundary
    category: factual
    status: resolved
    reason: Langfuse export needs optional packages, dependencies, credentials, network access, verification, and shutdown handling.
    verification:
      - {path: docs/src/llms-full.txt.erb, absent: "Observability automatically activates when Langfuse env vars are present", present: "environment variables alone do not establish delivery"}
      - {path: docs/src/llms-full.txt.erb, absent: "# Automatic tracking with log processing", present: "DSPy.events.subscribe(\"lm.tokens\")"}
  - id: llms-nonexistent-strategy-api
    category: factual
    status: resolved
    reason: The complete reference documented configuration constants and an extension interface that do not exist in the library.
    verification:
      - {path: docs/src/llms-full.txt.erb, absent: "c.strategy", present: "c.lm"}
      - {path: docs/src/llms-full.txt.erb, absent: "DSPy::Strategy::Strict", present: "#### DSPy.configure"}
      - {path: docs/src/llms-full.txt.erb, absent: "DSPy::StrategyInterface", present: "### Dynamic Module Configuration"}
  - id: llms-type-conversion-boundary
    category: factual
    status: resolved
    reason: Tool argument conversion covers declared supported types; unions require distinguishable members and do not make every Sorbet type unambiguous.
    verification:
      - {path: docs/src/llms.txt.erb, absent: "T.any() types automatically disambiguated", present: "when their members are distinguishable"}
      - {path: docs/src/llms.txt.erb, absent: "automatically convert JSON strings to proper Ruby types", present: "Toolsets coerce supported JSON values"}
      - {path: docs/src/llms-full.txt.erb, absent: "seamless automatic conversion", present: "supported declared types"}
      - {path: docs/src/llms-full.txt.erb, absent: "Conversion works for all Sorbet types", present: "when members are distinguishable"}
      - {path: docs/src/llms-full.txt.erb, absent: "Deep conversion at any level", present: "Nested combinations of supported types"}
  - id: home-layout-overclaims
    category: voice
    status: resolved
    reason: The high-traffic layout promised working agents and certain improvement without a metric or application boundary.
    verification:
      - {path: docs/src/_layouts/home.liquid, absent: "Build with confidence", present: "Build against explicit boundaries"}
      - {path: docs/src/_layouts/home.liquid, absent: "Everything you need to ship agents that work", present: "Build typed programs and bounded agents"}
      - {path: docs/src/_layouts/home.liquid, absent: "Know whether a change improves output", present: "Compare program behavior against chosen examples and metrics"}
      - {path: docs/src/_layouts/home.liquid, absent: "Ready to ship agents that work?", present: "Build your first typed program"}
      - {path: docs/src/index.md, absent: "Everything you love about Ruby", present: "Ruby types and control flow for LLM programs and agents"}
  - id: blog-layout-positioning
    category: voice
    status: resolved
    reason: The blog layout used an unbounded reliability title and generic actually-works copy.
    verification:
      - {path: docs/src/_layouts/blog_home.liquid, absent: "Build Reliable LLM Applications", present: "Typed LLM Systems in Ruby"}
      - {path: docs/src/_layouts/blog_home.liquid, absent: "tutorials that actually work", present: "Engineering notes on typed LLM programs"}
  - id: changelog-mvc-title-candidate
