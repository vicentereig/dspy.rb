version: 1
verdicts: [KEEP technical, KEEP voice, EDIT, DELETE]
# The two columns capture independent editorial lenses. `final` records the
# adjudication; it does not authorize a corpus edit in this issue. A `present`
# sample is checked verbatim. When an EDIT/DELETE is implemented, change it to
# `resolved`, add `resolution_reference`, and leave the old excerpt as history;
# the validator will then require that excerpt to be absent. `retired` means the
# calibration case itself is no longer relevant and requires a reason.
reviewers:
  reviewer_a: economy-and-voice
  reviewer_b: adversarial-correctness
samples:
