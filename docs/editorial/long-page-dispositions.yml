    example_owner: docs/src/production/observability.md
    anchor_policy: rendered
    anchors: [observability, score-reporting, langfuse-integration-zero-configuration]
    inbound_review: [docs/src/advanced/custom-metrics.md]
    discovery_review: [corpus, navigation, sitemap, llms.txt, llms-full.txt]
    risk_review: Trace setup and the protected trace-not-correctness boundary remain with Observability; score definitions are not duplicated.
  - source: docs/src/advanced/complex-types.md
    measured_tokens: 3170
