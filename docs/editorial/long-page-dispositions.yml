version: 1
measurement:
  review_trigger: 1500
  unit: markdown-body-token
  frontmatter: Excluded when the file begins with a YAML frontmatter block delimited by `---` lines.
  token_pattern: "[[:alnum:]_]+(?:[-_][[:alnum:]_]+)*"
  fenced_code: Included. Fence delimiters and punctuation do not count; every lexical word, identifier, and numeric literal inside a fence is counted by the same token pattern as prose.
  policy: The trigger opens a reader-task review. It is never a quota and never requires a split.

initial_inventory:
  - {source: docs/src/production/observability.md, tokens: 3215}
  - {source: docs/src/advanced/complex-types.md, tokens: 3166}
  - {source: docs/src/core-concepts/signatures.md, tokens: 2312}
  - {source: docs/src/core-concepts/predictors.md, tokens: 1992}
  - {source: docs/src/core-concepts/multimodal.md, tokens: 1813}
  - {source: docs/src/optimization/gepa.md, tokens: 1772}
