# Data files are outside the Markdown/ERB corpus by design. This bounded list
# records data that publishes reader-facing copy and ties each claim to its
# editorial adjudication without classifying every YAML file as documentation.
public_copy_sources:
  - path: docs/src/_data/site_metadata.yml
    format: yaml
    scope: Site title, tagline, description, author, canonical host, and social-card metadata; only tagline and description contain product claims.
    claims:
      - locator: "tagline: The Ruby Framework for Self-Improving Language Model Programs"
        voice_sample: self-improving-tagline
        status: present
        lifecycle: active
        disposition: delete
        reason: General self-improvement is not a current framework behavior.
      - locator: "description: Build self-improving AI systems with DSPy.rb - a Ruby implementation of Stanford's DSPy framework for programming with language models."
        voice_sample: stanford-port-description
        status: present
        lifecycle: active
        disposition: rewrite
        reason: Preserve project description and DSPy lineage with the approved Ruby-native programming-model wording.

# Each public/history source selected by the corpus manifest must match exactly
# one consideration rule. Anchor ids document where a group produced a ledger
# entry; an empty list records a completed scan, not an omission.
corpus_consideration:
  - {id: root-readme, path: README.md, result: anchors-recorded, anchors: [readme-product-promise, readme-three-beat-contrast, readme-mental-model]}
  - {id: changelog, path: CHANGELOG.md, result: history-reviewed, anchors: []}
  - {id: docs-home, path: docs/src/index.md, result: duplicate-reviewed, anchors: [readme-product-promise]}
  - {id: getting-started, glob: docs/src/getting-started/*.md, result: anchors-recorded, anchors: [ruby-versus-agent-ownership, agent-side-effect-boundary, validation-not-correctness]}
  - {id: core-concepts, glob: docs/src/core-concepts/*.md, result: anchors-recorded, anchors: [predictor-taxonomy]}
  - {id: build, path: docs/src/build/index.md, result: journey-selector-reviewed, anchors: []}
  - {id: advanced, glob: docs/src/advanced/*.md, result: anchors-recorded, anchors: [feature-parity-non-goal, application-state-ownership]}
  - {id: optimization, glob: docs/src/optimization/*.md, result: anchors-recorded, anchors: [evaluation-limits, anti-overfitting, optimizer-evidence-boundary]}
  - {id: production, glob: docs/src/production/*.md, result: anchors-recorded, anchors: [troubleshooting-decision-rule, application-state-ownership, provider-capability-boundary, trace-not-correctness]}
  - {id: blog-index, path: docs/src/blog/index.md, result: history-reviewed, anchors: []}
  - {id: articles, glob: docs/src/_articles/*.md, result: history-calibrated, anchors: [validation-not-correctness, ruby-versus-agent-ownership, agent-side-effect-boundary, trace-not-correctness, codeact-isolation]}
  - {id: llms-references, glob: docs/src/llms*.erb, result: generated-reference-reviewed, anchors: [readme-product-promise, readme-three-beat-contrast]}
  - {id: examples-index, path: examples/README.md, result: runnable-surface-reviewed, anchors: []}
  - {id: example-readmes, glob: examples/**/README.md, except: [examples/README.md], result: runnable-surface-reviewed, anchors: []}
  - {id: package-readmes, glob: lib/**/README.md, result: package-surface-reviewed, anchors: [codeact-isolation]}
