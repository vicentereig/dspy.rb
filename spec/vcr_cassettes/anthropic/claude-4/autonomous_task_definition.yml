        with ethical AI background\", \"Policy researcher and governance expert\",
        \"Synthesis specialist with implementation experience\"], \"reasoning\": \"The
        research topic requires advanced decomposition addressing the intersection
        of sustainable technology, developing country contexts, and moral decision-making.
        Step 1: Establish ethical foundations (Task 1) as the conceptual bedrock for
        all subsequent analysis. Step 2: Ground research in empirical reality through
        case studies and stakeholder analysis (Tasks 2, 4) to understand practical
